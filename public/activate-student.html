<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Student Account | Smart Campus SCRS</title>
    <link rel="stylesheet" href="css/style.css?v=fb878ca">
    <script src="js/config.js?v=fb878ca"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: radial-gradient(circle at top right, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 2rem;
            overflow-x: hidden;
        }
        .activate-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 100;
        }
        .step-container { display: none; }
        .step-container.active { display: block; }
        .form-group { margin-bottom: 2rem; }
        .form-label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 500;
            color: #f59e0b;
        }
        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.2rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: #f59e0b;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }
        .btn-activate {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-activate:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.4);
        }
        .btn-activate:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #888; }
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            width: 33.33%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        .info-box {
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.6;
        }
        .radio-group { width: 100%; margin-bottom: 2rem; }
        .radio-row { display: flex; gap: 1rem; }
        .radio-card { flex: 1; border: 1px solid var(--glass-border); border-radius: 12px; background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; padding: 1rem; text-align: center; }
        .radio-card input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .radio-content { display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: #aaa; font-weight: 500; }
        .radio-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(245, 158, 11, 0.4); }
        .radio-card input:checked ~ .radio-content { color: white; }
        .radio-card:has(input:checked) { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
    </style>
    

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.png">
</head>
<body>
    <div class="activate-container">
        <div class="header">
            <div class="role-badge"><i class="fa-solid fa-graduation-cap"></i> Student Portal</div>
            <h1>Activate Account</h1>
            <p id="step-desc">Verify your registered details</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <!-- Step 1: Verification -->
        <div class="step-container active" id="step-1">
            <div class="info-box">
                <i class="fa-solid fa-circle-info"></i>
                Only students <strong>pre-verified by the Institution</strong> can activate an account.
            </div>

            <div class="form-group radio-group" style="display: none;">
                <label class="form-label">Verification Method</label>
                <div class="radio-row">
                    <label class="radio-card">
                        <input type="radio" name="method" value="email" checked onchange="toggleMethod()">
                        <div class="radio-content">Official Email</div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="method" value="sms" onchange="toggleMethod()">
                        <div class="radio-content">Mobile Number</div>
                    </label>
                </div>
            </div>

            <div id="email-section" class="form-group">
                <label class="form-label">Registered Official Email</label>
                <input type="email" id="email" class="form-control" placeholder="e.g. s123@college.edu">
            </div>

            <div id="sms-section" class="form-group" style="display: none;">
                <label class="form-label">Registered Mobile Number</label>
                <input type="tel" id="mobile-number" class="form-control" placeholder="10-digit mobile number">
            </div>

            <button class="btn-activate" onclick="nextStep(1)">Send Activation OTP <i class="fa-solid fa-paper-plane"></i></button>
        </div>

        <!-- Step 2: OTP -->
        <div class="step-container" id="step-2">
            <div class="form-group" style="text-align: center;">
                <label class="form-label">Enter 6-Digit OTP</label>
                
                <div class="otp-box-container" id="otp-inputs">
                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*">
                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*">
                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*">
                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*">
                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*">
                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*">
                </div>
                <input type="hidden" id="otp-code">
                
                <p style="margin-top: 1rem; font-size: 0.9rem; color: #888;">Check your registered official email</p>
            </div>
            <button class="btn-activate" onclick="nextStep(2)">Verify OTP <i class="fa-solid fa-check-double"></i></button>
        </div>

        <!-- Step 3: Password -->
        <div class="step-container" id="step-3">
            <div class="form-group">
                <label class="form-label">Create Password</label>
                <input type="password" id="password" class="form-control" placeholder="Min 8 characters">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="Repeat password">
            </div>
            <button class="btn-activate" onclick="finishActivation()">Activate Student Account <i class="fa-solid fa-bolt"></i></button>
        </div>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
            Already activated? <a href="login.html?role=student" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Login here</a>
        </p>
    </div>

    <script>
        const ROLE = 'student'; // STRICT ROLE LOCK
    </script>
    <script src="js/activation.js?v=fb878ca"></script>
    <script src="js/uiUtils.js?v=fb878ca"></script>
</body>
</html>
