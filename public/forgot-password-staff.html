<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Reset Staff Password | Smart Campus SCRS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: radial-gradient(circle at top right, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 2rem;
        }
        .activate-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .step-container { display: none; }
        .step-container.active { display: block; }
        .form-group { margin-bottom: 2rem; }
        .form-label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 500;
            color: #f59e0b;
        }
        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.2rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: #f59e0b;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }
        .btn-activate {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 1rem;
        }
        .btn-activate:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.4);
        }
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #888; }
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            width: 33.33%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .staff-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="activate-container">
        <div class="header">
            <div class="staff-badge" id="role-badge"><i class="fa-solid fa-id-badge"></i> Staff / Faculty Portal</div>
            <h1 id="page-heading">Reset Staff Password</h1>
            <p id="step-desc">Choose your verification method</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <!-- Step 1: Request OTP -->
        <div class="step-container active" id="step-1">
            <div class="form-group">
                <label class="form-label">Verification Method</label>
                <select id="verification-method" class="form-control" onchange="toggleMethod()">
                    <option value="email">Official Email</option>
                    <option value="sms">Mobile Number</option>
                </select>
            </div>

            <div id="email-section" class="form-group">
                <label class="form-label" id="email-label"><i class="fa-solid fa-envelope"></i> Registered Official Email</label>
                <input type="email" id="email" class="form-control" placeholder="e.g. name@gdc.edu">
            </div>

            <div id="sms-section" class="form-group" style="display: none;">
                <label class="form-label"><i class="fa-solid fa-phone"></i> Registered Mobile Number</label>
                <input type="tel" id="mobile-number" class="form-control" placeholder="10-digit mobile number">
            </div>

            <button class="btn-activate" onclick="nextStep(1)">Send Reset OTP <i class="fa-solid fa-paper-plane"></i></button>
        </div>

        <!-- Step 2: Verify OTP -->
        <div class="step-container" id="step-2">
            <div class="form-group" style="text-align: center;">
                <label class="form-label">Enter 6-Digit OTP</label>
                <input type="text" id="otp-code" class="form-control" placeholder="Enter OTP" style="text-align: center; letter-spacing: 0.5rem; font-size: 1.5rem;">
                <p style="margin-top: 1rem; font-size: 0.9rem; color: #888;">OTP sent to your registered official email</p>
            </div>
            <button class="btn-activate" onclick="nextStep(2)">Verify OTP <i class="fa-solid fa-check-double"></i></button>
        </div>

        <!-- Step 3: New Password -->
        <div class="step-container" id="step-3">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" id="password" class="form-control" placeholder="Min 8 characters">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="Repeat new password">
            </div>
            <button class="btn-activate" onclick="finishReset()">Reset Staff Password <i class="fa-solid fa-bolt"></i></button>
        </div>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
            Remembered your password? <a id="login-link" href="login.html?role=Staff" style="color: #f59e0b; text-decoration: none;">Login here</a>
        </p>
    </div>

    <script>
        // Detect role from URL
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'Staff';

        // Dynamically configure the UI based on the chosen role
        if (role !== 'Staff') {
            document.getElementById('page-title').textContent = `Reset ${role} Password | Smart Campus SCRS`;
            document.getElementById('page-heading').textContent = `Reset ${role} Password`;
            
            let icon = '<i class="fa-solid fa-id-badge"></i>';
            if (role === 'Admin') icon = '<i class="fa-solid fa-shield-halved"></i>';
            else if (role === 'Principal') icon = '<i class="fa-solid fa-user-tie"></i>';
            else if (role === 'HOD') icon = '<i class="fa-solid fa-building-user"></i>';
            
            document.getElementById('role-badge').innerHTML = `${icon} ${role} Portal`;
            document.getElementById('step-desc').textContent = `Enter your ${role} Registered Email`;
            
            document.getElementById('email-label').innerHTML = `<i class="fa-solid fa-envelope"></i> ${role} Registered Email`;
            
            document.getElementById('login-link').href = `login.html?role=${role}`;
            
            // Update the button text inside step 3
            const resetBtn = document.querySelector('#step-3 .btn-activate');
            if(resetBtn) resetBtn.innerHTML = `Reset ${role} Password <i class="fa-solid fa-bolt"></i>`;
            
            if (role === 'Admin') {
                document.getElementById('login-link').style.color = '#ef4444';
                document.documentElement.style.setProperty('--form-accent', '#ef4444');
            }
        }

        let currentStep = 1;
        
        function toggleMethod() {
            const method = document.getElementById('verification-method').value;
            if (method === 'email') {
                document.getElementById('email-section').style.display = 'block';
                document.getElementById('sms-section').style.display = 'none';
            } else {
                document.getElementById('email-section').style.display = 'none';
                document.getElementById('sms-section').style.display = 'block';
            }
        }

        async function nextStep(step) {
            const selectedMethod = document.getElementById('verification-method').value;
            const payload = { role: role, method: selectedMethod };

            if (step === 1) {
                if (selectedMethod === 'email') {
                    const email = document.getElementById('email').value.trim();
                    if (!email) {
                        return alert('Please enter your registered email address.');
                    }
                    payload.email = email;
                } else {
                    const mobile = document.getElementById('mobile-number').value.trim();
                    if (!mobile) {
                        return alert('Please enter your registered mobile number.');
                    }
                    payload.mobile_number = mobile;
                }

                try {
                    const btn = document.querySelector('#step-1 .btn-activate');
                    btn.textContent = 'Sending OTP...';
                    btn.disabled = true;

                    const res = await fetch('/api/auth/request-reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (data.success) {
                        transitionToStep(2, "Enter Verification Code", "66.66%");
                    } else {
                        alert(data.message || 'Details not found. Only registered users can reset password.');
                    }
                    btn.innerHTML = 'Send Reset OTP <i class="fa-solid fa-paper-plane"></i>';
                    btn.disabled = false;
                } catch (err) {
                    alert('Request failed. Please try again.');
                }
            } else if (step === 2) {
                const otp = document.getElementById('otp-code').value.trim();
                if (!otp) return alert('Please enter the OTP.');
                
                payload.otp = otp;
                if (selectedMethod === 'email') {
                    payload.email = document.getElementById('email').value.trim();
                } else {
                    payload.mobile_number = document.getElementById('mobile-number').value.trim();
                }

                try {
                    const res = await fetch('/api/auth/verify-reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (data.success) {
                        transitionToStep(3, "Set New Password", "100%");
                    } else {
                        alert(data.message || 'Invalid or expired OTP.');
                    }
                } catch (err) { alert('Verification failed.'); }
            }
        }

        async function finishReset() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const otp = document.getElementById('otp-code').value.trim();
            const selectedMethod = document.getElementById('verification-method').value;

            if (!password || password.length < 8) return alert('Password must be at least 8 characters.');
            if (password !== confirmPassword) return alert('Passwords do not match.');

            const payload = {
                method: selectedMethod,
                otp: otp,
                password: password,
                role: role
            };

            if (selectedMethod === 'email') {
                payload.email = document.getElementById('email').value.trim();
            } else {
                payload.mobile_number = document.getElementById('mobile-number').value.trim();
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    alert(`Password reset successfully! Please login to your ${role} account with your new password.`);
                    window.location.href = `login.html?role=${role}`;
                } else {
                    alert(data.message || 'Reset failed.');
                }
            } catch (err) { alert('Reset failed.'); }
        }

        function transitionToStep(step, desc, progressWidth) {
            gsap.to(`#step-${currentStep}`, {
                duration: 0.3, x: -20, opacity: 0,
                onComplete: () => {
                    document.getElementById(`step-${currentStep}`).classList.remove('active');
                    document.getElementById(`step-${step}`).classList.add('active');
                    document.getElementById('step-desc').textContent = desc;
                    document.getElementById('progress-fill').style.width = progressWidth;
                    gsap.fromTo(`#step-${step}`, { x: 20, opacity: 0 }, { duration: 0.3, x: 0, opacity: 1 });
                    currentStep = step;
                }
            });
        }

        gsap.from(".activate-container", { duration: 1, y: 50, opacity: 0, ease: "power4.out" });
    </script>
</body>
</html>
