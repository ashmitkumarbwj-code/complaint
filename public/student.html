<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Smart Campus</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .welcome-card {
            background: var(--surface-light);
            padding: 2rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .complaint-form-card {
            background: var(--surface-light);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 2rem;
        }
        .complaint-list {
            display: grid;
            gap: 1.5rem;
        }
        .complaint-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem;
            border-radius: 12px;
            transition: var(--transition);
        }
        .complaint-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05);
        }
        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-inprogress { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-resolved { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status-escalated { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
    

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.png">
</head>
<body class="dashboard-page student-dashboard" style="display: none;">
    <div class="student-dashboard-bg"></div>
    <div class="student-overlay"></div>

    <div class="dashboard-container">
        <!-- Welcome Section -->
        <div class="welcome-card glass-panel" style="margin-top: 2rem;">
            <div class="d-flex align-items-center gap-3">
                <div class="logo-container">
                    <img src="images/branding/logo.png" alt="Logo" class="college-logo-small">
                </div>
                <div>
                    <h1 class="dashboard-title">Govt. College Dharamshala</h1>
                    <div class="d-flex align-items-center gap-2">
                        <div id="student-profile-img"></div>
                        <p id="welcome-text" class="welcome-subtitle">Hello, Student!</p>
                    </div>
                </div>
            </div>
            <button class="btn btn-glass" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>

        <div class="grid-2">
            <!-- Report Section -->
            <div class="student-card glass-panel" style="padding: 2.5rem;">
                <h2 style="margin-bottom: 2.5rem; color: var(--gold); display: flex; align-items: center; gap: 15px; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px;">
                    <i class="fa-solid fa-paper-plane" style="font-size: 1.4rem;"></i> Report New Issue
                </h2>
                <form id="complaint-form">
                    <div class="form-group mb-4">
                        <label class="form-label" style="font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 0.75rem; display: block; opacity: 0.8;">Complaint Title</label>
                        <input type="text" class="form-control elegant-input" id="complaint-title" placeholder="Brief summary of the issue..." required>
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label" style="font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 0.75rem; display: block; opacity: 0.8;">Issue Category</label>
                        <select class="form-control elegant-select" id="complaint-category" required>
                            <option value="" disabled selected>Select what's wrong...</option>
                            <option value="Noise">Noise in Hostel</option>
                            <option value="Electricity">Electricity Issue</option>
                            <option value="Infrastructure">Infrastructure Damage</option>
                            <option value="Mess">Mess Food Problem</option>
                            <option value="Security">Security Issue</option>
                            <option value="Harassment">Harassment / Bullying</option>
                            <option value="Faculty">Faculty Related</option>
                            <option value="Cleanliness">Cleanliness Concerns</option>
                            <option value="Other">Other Issues</option>
                        </select>
                    </div>
                    
                    <div class="form-row grid-2 mb-4" style="gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label" style="font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 0.75rem; display: block; opacity: 0.8;">Priority</label>
                            <select class="form-control elegant-select" id="complaint-priority" required>
                                <option value="Low">Low Priority</option>
                                <option value="Medium" selected>Medium Priority</option>
                                <option value="High">High Priority</option>
                                <option value="Emergency">🚨 EMERGENCY</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" style="font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 0.75rem; display: block; opacity: 0.8;">Specific Location</label>
                            <input type="text" class="form-control elegant-input" id="complaint-location" placeholder="e.g. Room 307 - Boys Hostel" required>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label" style="font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 0.75rem; display: block; opacity: 0.8;">Upload Evidence (Optional)</label>
                        <div class="file-upload-zone">
                            <input type="file" id="image" accept="image/*,video/*">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span>Drop an image or click to browse</span>
                        </div>
                    </div>

                    <div class="form-group mb-5">
                        <label class="form-label" style="font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 0.75rem; display: block; opacity: 0.8;">Detailed Description</label>
                        <textarea class="form-control elegant-textarea" id="complaint-description" rows="6" placeholder="Provide as much detail as possible to help us resolve this swiftly..." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit-premium">
                        <span>Submit Official Report</span>
                        <i class="fa-solid fa-arrow-right-long"></i>
                    </button>
                </form>
            </div>

            <!-- Tracking Section -->
            <div class="glass-panel" style="padding: 2.5rem;">
                <h2 style="margin-bottom: 2rem; display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-clock-rotate-left"></i> My Reports
                </h2>
                <div id="complaint-list" class="complaint-list">
                    <!-- Loaded dynamically -->
                    <div class="text-center" style="padding: 3rem; opacity: 0.6;">
                        <i class="fa-solid fa-spinner fa-spin fa-2x mb-3"></i>
                        <p>Syncing your reports...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .college-logo-small {
            height: 60px; border-radius: 50%; border: 2px solid var(--gold); padding: 3px;
        }
        .dashboard-title {
            font-size: 1.5rem; font-weight: 800; color: var(--gold); text-transform: uppercase; margin: 0; letter-spacing: 1px;
        }
        .welcome-subtitle {
            color: var(--text-secondary); margin: 0; font-weight: 500; font-size: 1rem;
        }
    </style>

    <script src="js/interactive-bubbles.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/student.js"></script>
    <script src="js/uiUtils.js"></script>
</body>
</html>
